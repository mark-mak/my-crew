name: Deploy Backend

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    name: Build, push image, deploy to Render
    runs-on: ubuntu-latest
    # Only run when CI passed on main
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/todo-backend:latest
            ghcr.io/${{ github.repository_owner }}/todo-backend:${{ github.sha }}

      - name: Trigger Render deploy hook
        run: curl -fsSX POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
